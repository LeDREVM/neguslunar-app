services:
  # ── Production (Nginx) ──────────────────────────────────
  neguslunar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neguslunar-app
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - neguslunar-network

  # ── Développement (Vite hot-reload) ─────────────────────
  neguslunar-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: neguslunar-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - neguslunar-network

networks:
  neguslunar-network:
    driver: bridge
