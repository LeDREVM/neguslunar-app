server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Configuration pour React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Proxy Nextcloud (WebDAV) pour éviter les erreurs CORS
    location /nc/ {
        # Autoriser toutes les méthodes HTTP (WebDAV: PROPFIND, MKCOL, PUT…)
        proxy_method $request_method;
        proxy_pass https://ledream.kflw.io/;
        proxy_set_header Host ledream.kflw.io;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;

        # Pas de buffer pour les petits uploads WebDAV
        proxy_buffering off;
        client_max_body_size 10M;

        # Gérer les preflight CORS du navigateur
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PROPFIND, MKCOL, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Depth';
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Cache pour les assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/neguslunar_access.log;
    error_log /var/log/nginx/neguslunar_error.log;
}
